<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YinD | CreateInvoicePage</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-invoice-client.js"></script>
  <script src="yind-auth.js"></script>
  <script>requireYindAuth("create-invoice-page.html");</script>
  <style>
    :root {
      --page: #f5f7fb;
      --card: #ffffff;
      --ink: #182230;
      --muted: #667085;
      --line: #d9e0ea;
      --field: #fbfcff;
      --primary: #0f766e;
      --primary-dark: #0b5f59;
      --danger: #c73535;
      --danger-dark: #9f2a2a;
      --success: #087443;
      --shadow: 0 10px 28px rgba(24, 34, 48, 0.07);
      font-family: "Noto Sans Thai", "Segoe UI", Tahoma, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background: var(--page);
    }

    main {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 36px;
    }

    .page-header {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      align-items: center;
      margin-bottom: 16px;
    }

    .eyebrow {
      margin: 0 0 3px;
      color: var(--primary);
      font-size: 0.82rem;
      font-weight: 900;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: 2rem;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .header-note {
      margin: 0;
      color: var(--muted);
      font-size: 0.9rem;
      text-align: right;
    }

    .page-nav {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    [data-ntpbenz-only][hidden] {
      display: none !important;
    }

    .nav-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0 13px;
      color: var(--muted);
      background: #ffffff;
      font-size: 0.88rem;
      font-weight: 800;
      text-decoration: none;
      transition: transform 0.2s ease, background 0.2s ease, border-color 0.2s ease;
      white-space: nowrap;
    }

    .nav-link:hover {
      border-color: #aeb8c8;
      background: #f8fafc;
      transform: translateY(-1px);
    }

    .nav-link.active {
      color: var(--primary);
      border-color: rgba(15, 118, 110, 0.35);
      background: #eaf7f4;
    }

    .nav-link svg {
      width: 16px;
      height: 16px;
      margin-right: 7px;
      stroke-width: 2.1;
    }

    .invoice-card {
      overflow: hidden;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    form {
      padding: 24px;
    }

    .section {
      padding: 0 0 22px;
      border-bottom: 1px solid var(--line);
      margin-bottom: 22px;
    }

    .section:last-of-type {
      border-bottom: 0;
      margin-bottom: 0;
      padding-bottom: 0;
    }

    .section-header {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-bottom: 14px;
    }

    .section-title {
      margin: 0;
      font-size: 1rem;
      font-weight: 900;
      letter-spacing: 0;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 16px;
    }

    .field {
      grid-column: span 6;
    }

    .field.full {
      grid-column: 1 / -1;
    }

    label,
    .item-label {
      display: block;
      margin-bottom: 6px;
      color: #344054;
      font-size: 0.84rem;
      font-weight: 700;
    }

    input,
    select,
    textarea {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 12px;
      color: var(--ink);
      background: var(--field);
      font: inherit;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    }

    select {
      appearance: none;
      background-image:
        linear-gradient(45deg, transparent 50%, #667085 50%),
        linear-gradient(135deg, #667085 50%, transparent 50%);
      background-position:
        calc(100% - 20px) 20px,
        calc(100% - 14px) 20px;
      background-size: 6px 6px, 6px 6px;
      background-repeat: no-repeat;
      padding-right: 38px;
    }

    textarea {
      min-height: 84px;
      resize: vertical;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: var(--primary);
      background-color: #ffffff;
      box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.12);
    }

    input[readonly] {
      color: #344054;
      background: #eef3f8;
      cursor: default;
      text-align: right;
      font-weight: 700;
    }

    textarea[readonly] {
      color: #344054;
      background: #eef3f8;
      cursor: default;
    }

    .readonly-display {
      display: flex;
      align-items: center;
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 12px;
      color: #344054;
      background: #eef3f8;
      font-weight: 800;
    }

    .advance-receipt-options {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      align-items: start;
      gap: 10px;
      padding: 14px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      background: #f8fafc;
    }

    .checkbox-label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      min-height: 46px;
      margin: 0;
      padding: 11px 13px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      color: #344054;
      background: #ffffff;
      font-weight: 700;
      cursor: pointer;
      transition: border-color 0.2s ease, background 0.2s ease, color 0.2s ease;
    }

    .checkbox-label:has(input:checked) {
      border-color: var(--primary);
      color: #0f5f5a;
      background: #eaf7f4;
    }

    .checkbox-label input {
      appearance: none;
      position: relative;
      order: 2;
      flex: 0 0 auto;
      width: 44px;
      height: 24px;
      min-height: 24px;
      border: 0;
      border-radius: 999px;
      padding: 0;
      margin: 0;
      background: #b8c5d3;
      box-shadow: none;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    .checkbox-label input::after {
      content: "";
      position: absolute;
      top: 3px;
      left: 3px;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #ffffff;
      box-shadow: 0 1px 3px rgba(15, 23, 42, 0.25);
      transition: transform 0.2s ease;
    }

    .checkbox-label input:checked {
      background: var(--primary);
    }

    .checkbox-label input:checked::after {
      transform: translateX(20px);
    }

    .checkbox-label input:disabled {
      cursor: not-allowed;
      opacity: 0.6;
    }

    .checkbox-label:has(input:disabled) {
      cursor: not-allowed;
      opacity: 0.72;
    }

    .advance-receipt-number label {
      margin-bottom: 6px;
    }

    .advance-receipt-number {
      width: min(100%, 180px);
    }

    .advance-receipt-number input {
      text-align: center;
      letter-spacing: 0.08em;
    }

    .advance-receipt-latest {
      margin: 0;
      color: #0f5f5a;
      font-size: 0.88rem;
      font-weight: 700;
      line-height: 1.65;
      white-space: pre-line;
    }

    .field.invalid input,
    .field.invalid select,
    .field.invalid textarea,
    .item-cell.invalid input,
    .item-cell.invalid textarea {
      border-color: var(--danger);
      box-shadow: 0 0 0 4px rgba(199, 53, 53, 0.1);
    }

    .error {
      min-height: 19px;
      margin-top: 6px;
      color: var(--danger);
      font-size: 0.83rem;
    }

    .item-table {
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background: #ffffff;
    }

    .item-head,
    .item-row {
      display: grid;
      grid-template-columns: minmax(240px, 1.55fr) minmax(86px, 0.46fr) minmax(124px, 0.68fr) minmax(136px, 0.74fr) 82px;
      gap: 10px;
      align-items: start;
    }

    .item-head {
      padding: 11px 14px;
      color: var(--muted);
      background: #f8fafc;
      border-bottom: 1px solid var(--line);
      font-size: 0.76rem;
      font-weight: 900;
    }

    .item-head div:not(:first-child) { text-align: right; }
    .item-head div:last-child { text-align: center; }

    .item-row {
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
    }

    .item-row:last-child {
      border-bottom: 0;
    }

    .item-row textarea {
      min-height: 42px;
    }

    .item-row [data-kind="quantity"],
    .item-row [data-kind="unitPrice"],
    .item-row [data-kind="rowTotal"] {
      text-align: right;
    }

    .item-row .item-cell:last-child {
      display: flex;
      align-items: flex-end;
    }

    .item-label {
      display: none;
    }

    .small-button {
      min-height: 38px;
      padding: 0 12px;
      font-size: 0.84rem;
    }

    .danger {
      width: 100%;
      color: #ffffff;
      background: var(--danger);
    }

    .danger:hover {
      background: var(--danger-dark);
    }

    .add-item {
      color: var(--primary);
      background: #ffffff;
      border-color: rgba(15, 118, 110, 0.35);
    }

    .add-item:hover {
      border-color: var(--primary);
      background: #eefaf7;
    }

    .totals {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #f8fafc;
    }

    .totals .field { grid-column: auto; }
    .totals label { margin-bottom: 5px; }
    .totals input { min-height: 42px; font-size: 1rem; }
    .totals .field:last-child input {
      color: #075e54;
      border-color: rgba(15, 118, 110, 0.35);
      background: #eaf7f4;
      font-size: 1.1rem;
    }

    .actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      padding-top: 22px;
    }

    button {
      min-height: 42px;
      border: 1px solid transparent;
      border-radius: 8px;
      padding: 0 18px;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.2s ease, background 0.2s ease, border-color 0.2s ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.55;
      transform: none;
    }

    .primary {
      color: #ffffff;
      background: var(--primary);
    }

    .primary:hover {
      background: var(--primary-dark);
    }

    .secondary {
      color: var(--ink);
      background: #ffffff;
      border-color: var(--line);
    }

    .secondary:hover {
      border-color: #aeb8c8;
      background: #f8fafc;
    }

    .status {
      min-height: 24px;
      margin: 18px 0 0;
      color: var(--success);
      font-weight: 700;
      text-align: right;
    }

    @media (max-width: 920px) {
      .item-head,
      .item-row {
        grid-template-columns: minmax(210px, 1.2fr) minmax(86px, 0.5fr) minmax(116px, 0.65fr) minmax(126px, 0.7fr) 88px;
        gap: 10px;
      }

      .item-table {
        overflow-x: auto;
      }

      .item-head,
      .item-row {
        min-width: 760px;
      }
    }

    @media (max-width: 760px) {
      main {
        width: min(100% - 24px, 1120px);
        padding: 24px 0;
      }

      .page-header,
      .section-header {
        display: block;
      }

      .header-note {
        margin-top: 8px;
        text-align: left;
      }

      .page-nav {
        width: 100%;
        margin-top: 14px;
      }

      .nav-link { flex: 1; }

      .section-header .add-item {
        width: 100%;
        margin-top: 14px;
      }

      form {
        padding: 20px;
      }

      .field {
        grid-column: 1 / -1;
      }

      .item-table {
        display: grid;
        gap: 14px;
        overflow: visible;
        border: 0;
        background: transparent;
      }

      .item-head {
        display: none;
      }

      .item-row {
        display: grid;
        grid-template-columns: 1fr;
        min-width: 0;
        gap: 14px;
        padding: 16px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #ffffff;
      }

      .item-label {
        display: block;
      }

      .totals {
        grid-template-columns: 1fr;
        padding: 16px;
      }

      .actions {
        flex-direction: column-reverse;
      }

      button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main>
    <header class="page-header">
      <div>
        <p class="eyebrow">YinD&Son</p>
        <h1>Create Invoice</h1>
      </div>

      <nav class="page-nav" aria-label="เมนูหลัก">
        <a class="nav-link" href="dashboard-page.html"><i data-lucide="layout-dashboard" aria-hidden="true"></i>Dashboard</a>
        <a class="nav-link active" href="create-invoice-page.html" aria-current="page"><i data-lucide="file-plus-2" aria-hidden="true"></i>Create Invoice</a>
        <a class="nav-link" href="report-page.html"><i data-lucide="file-text" aria-hidden="true"></i>Report</a>
        <a class="nav-link" href="work-list-calculator.html" data-ntpbenz-only hidden><i data-lucide="clipboard-list" aria-hidden="true"></i>Work List</a>
      </nav>
    </header>

    <section class="invoice-card" aria-label="CreateInvoicePage">
      <form id="invoiceForm" novalidate>
        <div class="section">
          <h2 class="section-title">ข้อมูลเอกสาร</h2>
          <div class="grid">
            <div class="field full">
              <label>ประเภทเอกสาร</label>
              <input id="documentType" name="ประเภทเอกสาร" type="hidden" value="ใบวางบิล / ใบแจ้งหนี้">
              <div class="readonly-display" id="documentTypeDisplay">ใบวางบิล / ใบแจ้งหนี้</div>
              <div class="error" aria-live="polite"></div>
            </div>
            <div class="field full" id="advanceReceiptField" hidden>
              <div class="advance-receipt-options">
                <label class="checkbox-label" for="advanceReceiptCheckbox">
                  <input id="advanceReceiptCheckbox" type="checkbox">
                  เปิดใบกำกับภาษีล่วงหน้า
                </label>
                <div class="advance-receipt-number">
                  <label for="advanceReceiptNumber">เลขท้ายเอกสาร (3 หลัก)</label>
                  <input id="advanceReceiptNumber" name="เลขท้ายเอกสาร" type="text" inputmode="numeric" autocomplete="off" maxlength="3" pattern="[0-9]{3}" placeholder="เช่น 010" disabled>
                  <div class="error" aria-live="polite"></div>
                </div>
                <p class="advance-receipt-latest" id="advanceReceiptLatestInfo" aria-live="polite"></p>
              </div>
            </div>
          </div>
        </div>

        <div class="section">
          <h2 class="section-title">ข้อมูลบริษัทลูกค้า</h2>
          <div class="grid">
            <div class="field full">
              <label for="customerCompany">ชื่อบริษัทลูกค้า</label>
              <input id="customerCompany" name="ชื่อบริษัทลูกค้า" type="text" autocomplete="organization" list="customerCompanyOptions" required>
              <datalist id="customerCompanyOptions"></datalist>
              <div class="error" aria-live="polite"></div>
            </div>

            <div class="field full">
              <label for="customerAddress">ที่อยู่บริษัทลูกค้า</label>
              <textarea id="customerAddress" name="ที่อยู่บริษัทลูกค้า" required></textarea>
              <div class="error" aria-live="polite"></div>
            </div>

            <div class="field">
              <label for="taxId">เลขประจำตัวผู้เสียภาษี</label>
              <input id="taxId" name="เลขประจำตัวผู้เสียภาษี" type="text" inputmode="numeric" required>
              <div class="error" aria-live="polite"></div>
            </div>

            <div class="field">
              <label for="invoiceDate">วันที่ออกเอกสาร</label>
              <input id="invoiceDate" name="วันที่ออกใบ" type="date" required>
              <div class="error" aria-live="polite"></div>
            </div>
          </div>
        </div>

        <div class="section">
          <div class="section-header">
            <h2 class="section-title">รายละเอียดรายการ</h2>
            <button class="add-item small-button" id="addItemButton" type="button">เพิ่มรายการ</button>
          </div>

          <div class="item-table" aria-label="รายการเอกสาร">
            <div class="item-head" aria-hidden="true">
              <div>รายการ</div>
              <div>จำนวน</div>
              <div>ราคา/หน่วย</div>
              <div>รวมเป็นเงิน</div>
              <div>ลบรายการ</div>
            </div>
            <div id="itemsBody"></div>
          </div>
        </div>

        <div class="section">
          <h2 class="section-title">สรุปยอดเงิน</h2>
          <div class="totals">
            <div class="field">
              <label for="subtotal">รวมเงิน (บาท)</label>
              <input id="subtotal" name="รวมเงิน" type="text" readonly value="0.00">
            </div>

            <div class="field">
              <label for="vatAmount">ภาษีมูลค่าเพิ่ม 7% (บาท)</label>
              <input id="vatAmount" name="ภาษีมูลค่าเพิ่ม 7%" type="text" readonly value="0.00">
            </div>

            <div class="field">
              <label for="grandTotal">ยอดเงินสุทธิ (บาท)</label>
              <input id="grandTotal" name="ยอดเงินสุทธิ" type="text" readonly value="0.00">
            </div>
          </div>
        </div>

        <div class="actions">
          <button class="secondary" type="reset">ล้างข้อมูล</button>
          <button class="primary" type="submit">บันทึกเอกสาร</button>
        </div>
        <p class="status" id="formStatus" aria-live="polite"></p>
      </form>
    </section>
  </main>

  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    const LOGIN_USERNAME_KEY = "yind_login_username";
    document.querySelectorAll("[data-ntpbenz-only]").forEach((element) => {
      const isNtpbenz = sessionStorage.getItem(LOGIN_USERNAME_KEY) === "ntpbenz";
      element.hidden = !isNtpbenz;
      element.style.display = isNtpbenz ? "" : "none";
    });
    if (window.lucide) {
      window.lucide.createIcons();
    }
    const form = document.querySelector("#invoiceForm");
    const documentType = document.querySelector("#documentType");
    const documentTypeDisplay = document.querySelector("#documentTypeDisplay");
    const subtotal = document.querySelector("#subtotal");
    const vatAmount = document.querySelector("#vatAmount");
    const grandTotal = document.querySelector("#grandTotal");
    const statusText = document.querySelector("#formStatus");
    const itemsBody = document.querySelector("#itemsBody");
    const addItemButton = document.querySelector("#addItemButton");
    const customerCompanyInput = document.querySelector("#customerCompany");
    const customerAddressInput = document.querySelector("#customerAddress");
    const taxIdInput = document.querySelector("#taxId");
    const customerCompanyOptions = document.querySelector("#customerCompanyOptions");
    const advanceReceiptField = document.querySelector("#advanceReceiptField");
    const advanceReceiptCheckbox = document.querySelector("#advanceReceiptCheckbox");
    const advanceReceiptNumber = document.querySelector("#advanceReceiptNumber");
    const advanceReceiptLatestInfo = document.querySelector("#advanceReceiptLatestInfo");
    const customerFields = [
      documentType,
      document.querySelector("#customerCompany"),
      document.querySelector("#customerAddress"),
      document.querySelector("#taxId"),
      document.querySelector("#invoiceDate")
    ];

    const moneyFormatter = new Intl.NumberFormat("th-TH", {
      minimumFractionDigits: 2,
      maximumFractionDigits: 2
    });

    const INVOICE_STORAGE_KEY = "yind_invoice_documents";
    const DEFAULT_DOCUMENT_TYPE = "ใบวางบิล / ใบแจ้งหนี้";
    const RECEIPT_DOCUMENT_TYPE = "ใบกำกับภาษี / ใบเสร็จรับเงิน";
    const pageParams = new URLSearchParams(window.location.search);
    const editingInvoiceId = pageParams.get("id");
    const receiptSourceId = pageParams.get("receiptFrom");
    const printInvoiceId = pageParams.get("printId");
    let currentSourceInvoiceId = "";
    let currentSourceInvoiceNumber = "";
    let currentDocumentNumber = "";
    let editingDocumentStatus = "issued";
    let reservedCreatedAt = "";
    let isTaxInvoiceEditLocked = false;

    function toNumber(value) {
      const numberValue = Number(value);
      return Number.isFinite(numberValue) ? numberValue : 0;
    }

    function formatMoney(value) {
      return moneyFormatter.format(value);
    }

    function clearStatus() {
      statusText.textContent = "";
    }

    async function loadCustomerDirectory() {
      try {
        customerDirectory = await fetchCustomerDirectory();
        customerCompanyOptions.innerHTML = customerDirectory
          .map((customer) => `<option value="${escapeHtml(customer.customer_name)}"></option>`)
          .join("");
      } catch (error) {
        console.warn("Unable to load customer directory", error);
      }
    }

    function fillCustomerDetailsFromDirectory() {
      const companyName = customerCompanyInput.value.trim();
      const customer = customerDirectory.find((item) => item.customer_name === companyName);
      if (!customer) {
        return;
      }

      customerAddressInput.value = customer.customer_address;
      taxIdInput.value = customer.tax_id;
      setFieldError(customerAddressInput, "");
      setFieldError(taxIdInput, "");
    }

    function setDocumentType(value) {
      const nextValue = value || DEFAULT_DOCUMENT_TYPE;
      documentType.value = nextValue;
      documentTypeDisplay.textContent = nextValue;
      updateAdvanceReceiptControls();
    }

    function updateAdvanceReceiptControls() {
      const isReceipt = isReceiptDocument(documentType.value);
      const isExistingIssuedReceipt = Boolean(editingInvoiceId) && editingDocumentStatus !== "reserved";
      advanceReceiptField.hidden = !isReceipt;

      if (!isReceipt) {
        advanceReceiptCheckbox.checked = false;
        advanceReceiptNumber.value = "";
        advanceReceiptLatestInfo.textContent = "";
        setFieldError(advanceReceiptNumber, "");
      }

      if (!advanceReceiptCheckbox.checked) {
        advanceReceiptLatestInfo.textContent = "";
      }

      advanceReceiptCheckbox.disabled = !isReceipt || isExistingIssuedReceipt || isTaxInvoiceEditLocked;
      advanceReceiptNumber.disabled = !isReceipt || !advanceReceiptCheckbox.checked || advanceReceiptCheckbox.disabled;
    }

    function setReceiptSourceLocked(isLocked, clearAdvanceReceipt = false) {
      const lockedFields = form.querySelectorAll(
        "#customerCompany, #customerAddress, #taxId, [data-kind='description'], [data-kind='quantity'], [data-kind='unitPrice']"
      );
      lockedFields.forEach((field) => {
        field.readOnly = isLocked;
      });

      addItemButton.disabled = isLocked;
      form.querySelector("button[type='reset']").disabled = isLocked;
      itemsBody.querySelectorAll(".delete-item").forEach((button) => {
        button.disabled = isLocked || itemsBody.querySelectorAll(".item-row").length === 1;
      });

      if (isLocked && clearAdvanceReceipt) {
        advanceReceiptCheckbox.checked = false;
        advanceReceiptNumber.value = "";
      }
      updateAdvanceReceiptControls();
    }

    function validateAdvanceReceiptNumber() {
      if (!isReceiptDocument(documentType.value) || !advanceReceiptCheckbox.checked) {
        setFieldError(advanceReceiptNumber, "");
        return true;
      }

      const value = advanceReceiptNumber.value.trim();
      const message = /^\d{3}$/.test(value) && Number(value) > 0
        ? ""
        : "กรุณากรอกเลขท้ายเอกสาร 3 หลัก ตั้งแต่ 001 ถึง 999";
      setFieldError(advanceReceiptNumber, message);
      return message === "";
    }

    async function updateLatestReceiptNumberInfo() {
      const lookupId = ++latestReceiptLookupId;
      if (!isReceiptDocument(documentType.value) || !advanceReceiptCheckbox.checked) {
        advanceReceiptLatestInfo.textContent = "";
        return;
      }

      advanceReceiptLatestInfo.textContent = "กำลังตรวจสอบหมายเลขใบกำกับภาษีล่าสุด...";
      try {
        const year = getDocumentYear(document.querySelector("#invoiceDate").value);
        const latestNumbers = await fetchLatestReceiptNumbersByStatus(year);
        if (lookupId !== latestReceiptLookupId) {
          return;
        }
        const reservedDateText = latestNumbers.reservedDocumentDate
          ? ` วันที่ออกเอกสาร: ${formatThaiDate(latestNumbers.reservedDocumentDate)}`
          : "";
        advanceReceiptLatestInfo.textContent = `หมายเลขใบกำกับภาษีล่าสุด: ${latestNumbers.issued || "-"}\nหมายเลขใบกำกับภาษีที่ออกล่วงหน้าล่าสุด: ${latestNumbers.reserved || "-"}${reservedDateText}`;
      } catch (error) {
        console.warn("Unable to load latest receipt number", error);
        if (lookupId === latestReceiptLookupId) {
          advanceReceiptLatestInfo.textContent = "ไม่สามารถตรวจสอบหมายเลขใบกำกับภาษีล่าสุดได้";
        }
      }
    }

    async function validateAdvanceReceiptReservationDate() {
      if (!isReceiptDocument(documentType.value) || !advanceReceiptCheckbox.checked) {
        return true;
      }

      const documentDateInput = document.querySelector("#invoiceDate");
      const year = getDocumentYear(documentDateInput.value);
      const latestNumbers = await fetchLatestReceiptNumbersByStatus(year);
      const latestReservedSequence = parseDocumentSequence(latestNumbers.reserved);
      const requestedSequence = Number(advanceReceiptNumber.value);
      const latestReservedDate = latestNumbers.reservedDocumentDate;
      const isEarlierReservedNumber = latestReservedSequence > 0 && requestedSequence < latestReservedSequence;
      const isLaterDocumentDate = Boolean(latestReservedDate) && documentDateInput.value > latestReservedDate;

      if (isEarlierReservedNumber && isLaterDocumentDate) {
        setFieldError(documentDateInput, "ไม่สามารถบันทึกได้ กรุณาเลือกวันที่ออกเอกสารใหม่");
        return false;
      }

      return true;
    }

    function getLocalIsoDate() {
      const now = new Date();
      const localTime = new Date(now.getTime() - now.getTimezoneOffset() * 60000);
      return localTime.toISOString().slice(0, 10);
    }

    function getLocalDateFromTimestamp(value) {
      const timestamp = new Date(value);
      if (Number.isNaN(timestamp.getTime())) {
        return "";
      }

      const localTime = new Date(timestamp.getTime() - timestamp.getTimezoneOffset() * 60000);
      return localTime.toISOString().slice(0, 10);
    }

    function validateReservedReceiptIssuance() {
      const isChangingReservedReceiptToIssued = Boolean(editingInvoiceId)
        && editingDocumentStatus === "reserved"
        && !advanceReceiptCheckbox.checked;

      if (!isChangingReservedReceiptToIssued) {
        return true;
      }

      const today = getLocalIsoDate();
      const reservedDate = getLocalDateFromTimestamp(reservedCreatedAt);
      const documentDate = document.querySelector("#invoiceDate").value;
      let message = "";

      if (!reservedDate) {
        message = "ไม่พบวันที่สร้างรายการจอง จึงยังออกใบกำกับภาษีไม่ได้";
      } else if (today <= reservedDate) {
        message = "เอกสารที่จองในวันนี้ยังเปลี่ยนเป็น issued ไม่ได้";
      } else if (documentDate !== today) {
        message = "กรุณาเลือกวันที่ออกเอกสารเป็นวันที่ปัจจุบันก่อนออกใบกำกับภาษี";
      }

      setFieldError(document.querySelector("#invoiceDate"), message);
      return message === "";
    }

    function setFieldError(input, message) {
      const field = input.closest(".field, .item-cell");
      const error = field.querySelector(".error");
      field.classList.toggle("invalid", Boolean(message));
      if (error) {
        error.textContent = message;
      }
    }

    function validateRequiredField(input) {
      const verb = input.type === "date" ? "เลือก" : "กรอก";
      const message = input.value.trim() === "" ? `กรุณา${verb}${input.name}` : "";
      setFieldError(input, message);
      return message === "";
    }

    function validateDocumentType() {
      const message = documentType.value === "" ? "กรุณาเลือกประเภทเอกสาร" : "";
      setFieldError(documentType, message);
      return message === "";
    }

    function validateItemField(input) {
      const value = input.value.trim();
      let message = "";

      if (input.dataset.kind === "description" && value === "") {
        message = "กรุณากรอกรายละเอียดรายการ";
      }

      if (input.dataset.kind === "quantity" && toNumber(value) <= 0) {
        message = "จำนวนต้องมากกว่า 0";
      }

      if (input.dataset.kind === "unitPrice" && toNumber(value) <= 0) {
        message = "ราคา/หน่วยต้องมากกว่า 0";
      }

      setFieldError(input, message);
      return message === "";
    }

    function updateDeleteButtons() {
      const rows = Array.from(itemsBody.querySelectorAll(".item-row"));
      rows.forEach((row) => {
        row.querySelector(".delete-item").disabled = rows.length === 1;
      });
    }

    function updateRowTotal(row) {
      const quantity = row.querySelector("[data-kind='quantity']");
      const unitPrice = row.querySelector("[data-kind='unitPrice']");
      const rowTotal = row.querySelector("[data-kind='rowTotal']");
      const total = toNumber(quantity.value) * toNumber(unitPrice.value);
      rowTotal.value = formatMoney(total);
      rowTotal.dataset.value = String(total);
    }

    function updateTotals() {
      const rows = Array.from(itemsBody.querySelectorAll(".item-row"));
      const subtotalValue = rows.reduce((sum, row) => {
        updateRowTotal(row);
        return sum + toNumber(row.querySelector("[data-kind='rowTotal']").dataset.value);
      }, 0);
      const vatValue = subtotalValue * 0.07;
      const grandTotalValue = subtotalValue + vatValue;

      subtotal.value = formatMoney(subtotalValue);
      vatAmount.value = formatMoney(vatValue);
      grandTotal.value = formatMoney(grandTotalValue);
    }

    function wireItemEvents(row) {
      const fields = Array.from(row.querySelectorAll("[data-validate='item']"));
      fields.forEach((input) => {
        input.addEventListener("input", () => {
          updateTotals();
          validateItemField(input);
          clearStatus();
        });
        input.addEventListener("blur", () => validateItemField(input));
      });

      row.querySelector(".delete-item").addEventListener("click", () => {
        if (itemsBody.querySelectorAll(".item-row").length === 1) {
          return;
        }

        row.remove();
        updateDeleteButtons();
        updateTotals();
        clearStatus();
      });
    }

    function createItemRow() {
      const row = document.createElement("div");
      row.className = "item-row";
      row.innerHTML = `
        <div class="item-cell">
          <label class="item-label">รายละเอียดรายการ</label>
          <textarea name="รายละเอียดรายการ" data-kind="description" data-validate="item" required></textarea>
          <div class="error" aria-live="polite"></div>
        </div>
        <div class="item-cell">
          <label class="item-label">จำนวน</label>
          <input name="จำนวน" type="number" min="0" step="1" data-kind="quantity" data-validate="item" required>
          <div class="error" aria-live="polite"></div>
        </div>
        <div class="item-cell">
          <label class="item-label">ราคา/หน่วย</label>
          <input name="ราคา/หน่วย" type="number" min="0" step="0.01" data-kind="unitPrice" data-validate="item" required>
          <div class="error" aria-live="polite"></div>
        </div>
        <div class="item-cell">
          <label class="item-label">รวมเป็นเงิน</label>
          <input name="รวมเป็นเงิน" type="text" data-kind="rowTotal" data-value="0" readonly value="0.00">
        </div>
        <div class="item-cell">
          <label class="item-label">ลบรายการ</label>
          <button class="danger small-button delete-item" type="button">ลบ</button>
        </div>
      `;
      itemsBody.append(row);
      wireItemEvents(row);
      updateDeleteButtons();
      updateTotals();
    }

    function validateItems() {
      let isValid = true;
      const itemFields = Array.from(itemsBody.querySelectorAll("[data-validate='item']"));

      itemFields.forEach((input) => {
        if (!validateItemField(input)) {
          isValid = false;
        }
      });

      return isValid;
    }

    function validateForm() {
      let isValid = true;

      customerFields.forEach((input) => {
        if (input !== documentType && !validateRequiredField(input)) {
          isValid = false;
        }
      });

      if (!validateItems()) {
        isValid = false;
      }

      if (!validateAdvanceReceiptNumber()) {
        isValid = false;
      }

      if (!validateReservedReceiptIssuance()) {
        isValid = false;
      }

      return isValid;
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function getPlainNumber(value) {
      return toNumber(String(value).replaceAll(",", ""));

    function getInvoiceItems() {
      return Array.from(itemsBody.querySelectorAll(".item-row")).map((row) => {
        const quantityValue = toNumber(row.querySelector("[data-kind='quantity']").value);
        const unitPriceValue = toNumber(row.querySelector("[data-kind='unitPrice']").value);
        const amountValue = quantityValue * unitPriceValue;

        return {

          quantity: quantityValue,

          amount: amountValue

    function formatThaiDate(dateValue) {
      if (!dateValue) {
        return "";
      }

      const [year, month, day] = dateValue.split("-").map(Number);
      return `${day} / ${month} / ${year + 543}`;
    }

    function isReceiptDocument(typeValue) {
      return typeValue === RECEIPT_DOCUMENT_TYPE || String(typeValue || "").includes("ใบเสร็จรับเงิน");
    }

    function getDocumentGroup(typeValue) {
      return isReceiptDocument(typeValue) ? "RE" : "INV";
    }

    function getDocumentYear(dateValue) {
      return dateValue ? Number(dateValue.slice(0, 4)) + 543 : new Date().getFullYear() + 543;
    }

    function formatDocumentNumber(documentGroup, year, sequence = 1, width = 3) {
      return `${documentGroup}-${year}-${String(sequence).padStart(width, "0")}`;
    }

    function getDocumentNumber(dateValue, typeValue, sequence = 1) {
      return formatDocumentNumber(getDocumentGroup(typeValue), getDocumentYear(dateValue), sequence);
    }

    function parseDocumentSequence(documentNumber) {
      const value = String(documentNumber || "").trim();
      const receiptMatch = value.match(/^RE-\d{4}-(\d{3})$/i);
      const billingMatch = value.match(/^INV01-(\d{3})$/i);
      const datedInvoiceMatch = value.match(/^INV-\d{4}-(\d{3,4})$/i);

      return Number(
        receiptMatch?.[1]
        || billingMatch?.[1]
        || datedInvoiceMatch?.[1]
        || 0
      );
    }

    function getReservedDocumentSuffix(documentNumber) {
      const match = String(documentNumber || "").match(/(\d{3})$/);
      return match ? match[1] : "";
    }

    function getLatestDocumentNumberFormat(documentGroup, year, usedNumbers) {
      const latestDocumentNumber = [...usedNumbers]
        .sort((left, right) => parseDocumentSequence(right) - parseDocumentSequence(left))[0];
      const formatMatch = String(latestDocumentNumber || "").match(/^(.*-)(\d{3,4})$/);

      return formatMatch
        ? { prefix: formatMatch[1], width: formatMatch[2].length }
        : { prefix: `${documentGroup}-${year}-`, width: 3 };
    }

    function formatDocumentNumberWithFormat(sequence, format) {
      return `${format.prefix}${String(sequence).padStart(format.width, "0")}`;
    }

    function isBillingInvoiceNumber(documentNumber) {
      return /^INV01-\d{3}$/.test(String(documentNumber || "").toUpperCase());
    }

    async function findNextAvailableDocumentNumber(documentGroup, year) {
      const usedNumbers = await fetchUsedDocumentNumbers(documentGroup, year);
      if (documentGroup === "INV") {
        let sequence = Math.max(
          0,
          ...usedNumbers
            .filter(isBillingInvoiceNumber)
            .map(parseDocumentSequence)
        ) + 1;
        let documentNumber = `INV01-${String(sequence).padStart(3, "0")}`;

        while (!await isDocumentNumberAvailable(documentNumber)) {
          sequence += 1;
          documentNumber = `INV01-${String(sequence).padStart(3, "0")}`;
        }

        return documentNumber;
      }

      const format = getLatestDocumentNumberFormat(documentGroup, year, usedNumbers);
      const issuedNumbers = await fetchIssuedDocumentNumbers(documentGroup, year);
      const usedSequences = new Set(usedNumbers.map(parseDocumentSequence).filter((value) => value > 0));
      let sequence = Math.max(0, ...issuedNumbers.map(parseDocumentSequence)) + 1;
      while (usedSequences.has(sequence)) {
        sequence += 1;
      }
      let documentNumber = formatDocumentNumberWithFormat(sequence, format);

      while (!await isDocumentNumberAvailable(documentNumber)) {
        sequence += 1;
        while (usedSequences.has(sequence)) {
          sequence += 1;
        }
        documentNumber = formatDocumentNumberWithFormat(sequence, format);
      }

      return documentNumber;
    }

    async function validateDocumentNumberBeforeSave(documentNumber) {
      const isAvailable = await isDocumentNumberAvailable(documentNumber, editingInvoiceId || "");
      if (!isAvailable) {
        throw new Error(`หมายเลขเอกสาร ${documentNumber} ถูกใช้แล้ว กรุณาลองบันทึกอีกครั้ง`);
      }
    }

    function thaiNumberText(number) {
      const digits = ["ศูนย์", "หนึ่ง", "สอง", "สาม", "สี่", "ห้า", "หก", "เจ็ด", "แปด", "เก้า"];
      const positions = ["", "สิบ", "ร้อย", "พัน", "หมื่น", "แสน"];

      function convertLessThanMillion(value) {
        if (value === 0) {
          return "";
        }

        const chars = String(value).split("").map(Number);
        const length = chars.length;
        return chars.map((digit, index) => {
          if (digit === 0) {
            return "";
          }

          const position = length - index - 1;
          if (position === 0 && digit === 1 && length > 1) {
            return "เอ็ด";
          }
          if (position === 1 && digit === 1) {
            return "สิบ";
          }
          if (position === 1 && digit === 2) {
            return "ยี่สิบ";
          }

          return `${digits[digit]}${positions[position]}`;
        }).join("");
      }

      function convertInteger(value) {
        if (value === 0) {
          return digits[0];
        }

        const million = Math.floor(value / 1000000);
        const rest = value % 1000000;
        return `${million ? `${convertInteger(million)}ล้าน` : ""}${convertLessThanMillion(rest)}`;
      }

      const rounded = Math.round(number * 100) / 100;
      const baht = Math.floor(rounded);
      const satang = Math.round((rounded - baht) * 100);

      if (satang === 0) {
        return `${convertInteger(baht)}บาทถ้วน`;
      }

      return `${convertInteger(baht)}บาท${convertInteger(satang)}สตางค์`;
    }

      grid-template-columns: 1fr 1fr;
      width: 102mm;
      margin-top: 3.5mm;
      border: 1px solid #111827;
      min-height: 17mm;
    }
    .signature div { position: relative; text-align: center; font-size: 10.8px; font-weight: 700; padding-top: 5px; }
    .signature div + div { border-left: 1px solid #111827; }
    .signature div:after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: 6mm;
      border-bottom: 0.85px dotted #111827;
    }
    .signature-billing {
      grid-template-columns: 1fr 1fr 1.45fr;
      width: 100%;
      min-height: 19mm;
    }
    .signature-billing div {
      font-size: 10.3px;
      padding-top: 5px;
    }
    @media print {
      html,
      body {
        width: 196mm;
        height: 283mm;
        min-height: 283mm;
        overflow: hidden;
      }
      .sheet {
        width: 196mm;
        height: 283mm;
        min-height: 283mm;
        margin: 0;
        padding: 0;
        overflow: hidden;
      }
    }
  </style>
</head>
<body>
  <div class="sheet">
    <div class="top-note">ต้นฉบับ</div>
    <div class="header">
      <div>
        <div class="brand">
          <div class="logo"><img src="${YIND_LOGO_DATA_URL}" alt="YinD and Sons logo"></div>
          <div class="company-name">บริษัท ยินดีแอนด์ซันส์ จำกัด</div>
        </div>
        <div class="company-lines">
          <div>สำนักงานใหญ่ 155/101 หมู่ที่ 10 ตำบลสุรศักดิ์ อำเภอศรีราชา จังหวัดชลบุรี 20110</div>
          <div>โทร 081-4529760</div>
          <div>เลขประจำตัวผู้เสียภาษีอากร&nbsp;&nbsp;0 2055 60022 22 3</div>
        </div>
      </div>
      <div class="doc-title">${escapeHtml(data.documentType)}</div>
    </div>
    <div class="info-grid">
      <div class="box customer-box">
        <div class="customer-row"><strong>ชื่อลูกค้า / Customers:</strong><div>${escapeHtml(data.customerCompany)}</div></div>
        <div class="customer-row"><strong>ที่อยู่ / Address:</strong><div>${escapeHtml(data.customerAddress).replaceAll("\n", "<br>")}</div></div>
        <div class="customer-row"><strong>เลขประจำตัวผู้เสียภาษี</strong><div>${escapeHtml(data.taxId)}</div></div>
      </div>
      <div class="box doc-box">
        <div class="doc-row"><strong>เลขที่ / No.</strong><div class="doc-number">${escapeHtml(data.documentNumber)}</div></div>
        <div class="doc-row"><strong>วันที่ / Date</strong><div>${escapeHtml(data.dateText)}</div></div>
      </div>
    </div>
    <table class="items">
      <colgroup>
        <col class="w-index">
        <col class="w-description">
        <col class="w-qty">
        <col class="w-price">
        <col class="w-amount">
      </colgroup>
      <thead>
        <tr>
          <th class="w-index">ลำดับที่<br>Item</th>
          <th>รายการ<br>Description</th>
          <th class="w-qty">จำนวน<br>Quantity</th>
          <th class="w-price">ราคา/หน่วย<br>Unit Price</th>
          <th class="w-amount">จำนวนเงิน<br>Amount</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>
    <table class="bottom-table">
      <colgroup>
        <col class="w-index">
        <col class="w-description">
        <col class="w-qty">
        <col class="w-price">
        <col class="w-amount">
      </colgroup>
      <tbody>
        <tr>
          <td class="payment-cell" colspan="2" rowspan="3">${paymentContent}</td>
          <td class="summary-label" colspan="2">รวมเงิน<br>TOTAL</td>
          <td class="summary-value">${formatMoney(data.subtotal)}</td>
        </tr>
        <tr>
          <td class="summary-label" colspan="2">ภาษีมูลค่าเพิ่ม<br>( VAT 7% )</td>
          <td class="summary-value">${formatMoney(data.vatAmount)}</td>
        </tr>
        <tr>
          <td class="summary-label" colspan="2">ยอดเงินสุทธิ<br>NET AMOUNT</td>
          <td class="summary-value">${formatMoney(data.grandTotal)}</td>
        </tr>
      </tbody>
    </table>
    <div class="words"><strong>ตัวอักษร</strong><div class="text">( ${escapeHtml(data.grandTotalText)} )</div></div>
    ${signatureContent}
  </div>
</body>
</html>`;
    }

    function openPdfPrintPreview() {
      const printableWindow = window.open("", "_blank");
      const printableHtml = buildPdfDocumentHtml(collectInvoiceData());

      if (!printableWindow) {
        statusText.textContent = "กรุณาอนุญาต popup เพื่อเปิดหน้าบันทึก PDF";
        return;
      }

      printableWindow.document.open();
      printableWindow.document.write(printableHtml);
      printableWindow.document.close();
      window.setTimeout(() => {
        printableWindow.focus();
        printableWindow.print();
      }, 250);
    }

    async function openStoredPdfDocument() {
      if (!printInvoiceId) {
        return false;
      }

      try {
        statusText.textContent = "กำลังโหลดไฟล์ PDF...";
        const record = await fetchInvoiceById(printInvoiceId);
        const referenceInvoiceNumber = record.source_invoice_id
          ? await fetchInvoiceNumberById(record.source_invoice_id)
          : "";
        const printableHtml = buildPdfDocumentHtml(mapRecordToPdfData(record, referenceInvoiceNumber));
        document.open();
        document.write(printableHtml);
        document.close();
        window.setTimeout(() => {
          window.focus();
          window.print();
        }, 250);
      } catch (error) {
        console.error(error);
        statusText.textContent = error.message || "โหลดไฟล์ PDF ไม่สำเร็จ";
      }

      return true;
    }

    customerFields.forEach((input) => {
      input.addEventListener("input", () => {
        if (input === documentType) {
          validateDocumentType();
        } else {
          validateRequiredField(input);
        }
        clearStatus();
      });
      input.addEventListener("blur", () => {
        if (input === documentType) {
          validateDocumentType();
        } else {
          validateRequiredField(input);
        }
      });
    });

    addItemButton.addEventListener("click", () => {
      createItemRow();
      clearStatus();
    });

    advanceReceiptCheckbox.addEventListener("change", () => {
      updateAdvanceReceiptControls();
      validateAdvanceReceiptNumber();
      validateReservedReceiptIssuance();
      updateLatestReceiptNumberInfo();
      clearStatus();
    });

    advanceReceiptNumber.addEventListener("input", () => {
      advanceReceiptNumber.value = advanceReceiptNumber.value.replace(/\D/g, "").slice(0, 3);
      validateAdvanceReceiptNumber();
      clearStatus();
    });

    advanceReceiptNumber.addEventListener("blur", validateAdvanceReceiptNumber);

    customerCompanyInput.addEventListener("change", fillCustomerDetailsFromDirectory);
    customerCompanyInput.addEventListener("input", fillCustomerDetailsFromDirectory);

    document.querySelector("#invoiceDate").addEventListener("change", () => {
      validateReservedReceiptIssuance();
      updateLatestReceiptNumberInfo();
    });

    form.addEventListener("submit", async (event) => {
      event.preventDefault();

      if (!validateForm()) {
        statusText.textContent = "";
        return;
      }

      try {
        if (!await validateAdvanceReceiptReservationDate()) {
          statusText.textContent = "";
          return;
        }
        statusText.textContent = "กำลังบันทึกเอกสาร...";
        await saveInvoiceRecord();
        statusText.textContent = editingInvoiceId ? "บันทึกการแก้ไขเรียบร้อย" : "บันทึกเอกสารเรียบร้อย";
        openPdfPrintPreview();
        sessionStorage.setItem("yind_dashboard_notice", editingInvoiceId ? "บันทึกการแก้ไขเอกสารเรียบร้อย" : "บันทึกเอกสารเรียบร้อย");
        window.setTimeout(() => {
          window.location.href = "dashboard-page.html";
        }, 350);
      } catch (error) {
        console.error(error);
        statusText.textContent = error.message || "บันทึกเอกสารไม่สำเร็จ";
      }
    });

    form.addEventListener("reset", () => {
      const currentDocumentType = documentType.value;
      window.setTimeout(() => {
        itemsBody.innerHTML = "";
        customerFields.forEach((input) => setFieldError(input, ""));
        setDocumentType(currentDocumentType);
        advanceReceiptCheckbox.checked = false;
        advanceReceiptNumber.value = "";
        updateAdvanceReceiptControls();
        createItemRow();
        statusText.textContent = "";
      });
    });

    setDocumentType(documentType.value);
    openStoredPdfDocument().then((isPrintMode) => {
      if (isPrintMode) {
        return;
      }

      loadCustomerDirectory();
      createItemRow();
      loadInvoiceForEdit();
    });
  </script>
</body>
</html>
